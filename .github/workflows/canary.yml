name: Canary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Echo hello
        run: echo "Hello from GitHub Actions"

      - name: Show run context
        run: |
          echo "Repo:   ${{ github.repository }}"
          echo "Actor:  ${{ github.actor }}"
          echo "Event:  ${{ github.event_name }}"
          echo "Ref:    ${{ github.ref }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          node --version || true
          npm --version || true
